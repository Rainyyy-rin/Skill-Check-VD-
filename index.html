<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Check Trainer sirengg</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Skill Check Trainer</h1>

 <h5>by:sirengg</h5>

<h2 id="score">Score : 0</h2>

<h3 id="highScore">High Score : 0</h3>

<h2 id="result"></h2>

<div id="game">
    <div id="circle">

    <svg id="skillZone" viewBox="0 0 250 250">

        <!-- Lingkaran luar -->
        <circle
            cx="100"
            cy="100"
            r="100"
            stroke="none"
            stroke-width="5"
            fill="none"/>

        <!-- GOOD -->
        <path
             id="goodBorder"
             stroke="white"
             stroke-width="16"
             fill="none"
             stroke-linecap="butt"/>
    
        <path
            id="goodArc"
            stroke="black"
            stroke-width="12"
            fill="none"
            stroke-linecap="butt"/>

        <!-- GREAT -->
        <path
           id="greatBorder"
           stroke="white"
           stroke-width="16"
           fill="none"
           stroke-linecap="butt"/>

        <path
           id="greatArc"
           stroke="white"
           stroke-width="12"
           fill="none"
           stroke-linecap="butt"/>

    <line
    id="pointer"
    x1="125"
    y1="125"
    x2="125"
    y2="18"
    stroke="red"
    stroke-width="4"/>
    </svg>

   </div>
</div>

<button id="startBtn">START</button>

<script src="sound.js"></script>
<script src="script.js"></script>

</body>
</html>
